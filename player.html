<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squiglink Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0f0f10;
    --bg2:       #161618;
    --bg3:       #1e1e21;
    --bg4:       #252529;
    --border:    #2a2a30;
    --accent:    #7c6af7;
    --accent2:   #a89ff9;
    --text:      #e8e8ec;
    --muted:     #7a7a85;
    --danger:    #f76a6a;
    --green:     #6af7a0;
    --sidebar-w: 300px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ─────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar .logo {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 14px;
    color: var(--accent2);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  #topbar .logo span { color: var(--muted); font-weight: 300; }

  #now-playing-bar {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  #np-title {
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #np-folder {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'DM Mono', monospace;
  }

  /* transport controls */
  #transport {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .t-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    padding: 5px 10px;
    font-size: 13px;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .t-btn:hover { background: var(--bg4); }
  .t-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* progress */
  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px 8px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #progress-bar-outer {
    flex: 1;
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  #progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  #time-cur, #time-tot {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  #vol-wrap { display: flex; align-items: center; gap: 6px; }
  #vol-icon { font-size: 13px; color: var(--muted); }
  #vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 70px; height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }

  /* ── MAIN ────────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ─────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #search-wrap {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  #library {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  #library::-webkit-scrollbar { width: 4px; }
  #library::-webkit-scrollbar-track { background: transparent; }
  #library::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .lib-folder {
    padding: 6px 12px 2px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .lib-folder:first-child { border-top: none; margin-top: 0; }

  .lib-track {
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: 4px;
    margin: 1px 4px;
    color: var(--text);
    transition: background 0.1s;
  }
  .lib-track:hover { background: var(--bg3); }
  .lib-track.playing {
    background: rgba(124,106,247,0.18);
    color: var(--accent2);
    font-weight: 500;
  }

  #lib-status {
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  /* ── EQ PANEL ────────────────────────────────── */
  #eq-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* top toolbar */
  #eq-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .section-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  #eq-toolbar .section-label { margin-right: 4px; }

  .btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    cursor: pointer;
    padding: 5px 11px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s;
    line-height: 1.4;
  }
  .btn:hover { background: var(--bg4); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: rgba(247,106,106,0.1); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* EQ toggle pill */
  .eq-toggle-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 10px; cursor: pointer;
    font-size: 11px; color: var(--muted); transition: border-color 0.15s;
  }
  .eq-toggle-pill.on { border-color: var(--accent); color: var(--accent2); }
  #eq-enabled { display: none; }
  .eq-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition: background 0.2s; }
  .eq-toggle-pill.on .eq-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* ── Curve canvas ── */
  #eq-canvas-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
    cursor: crosshair;
  }
  #eq-canvas { display: block; width: 100%; height: 100%; }

  /* ── Band strip ── */
  #band-strip {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    overflow-x: auto;
    flex-shrink: 0;
  }
  #band-strip::-webkit-scrollbar { height: 3px; }
  #band-strip::-webkit-scrollbar-thumb { background: var(--bg4); }

  .band-card {
    min-width: 88px;
    border-right: 1px solid var(--border);
    padding: 8px 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .band-card:hover { background: var(--bg3); }
  .band-card.selected { background: rgba(124,106,247,0.12); }
  .band-card.disabled { opacity: 0.38; }

  .band-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .band-type-sel {
    background: transparent;
    border: none;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    outline: none;
    width: 100%;
  }
  .band-type-sel option { background: var(--bg2); color: var(--text); }

  .band-val {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text);
    white-space: nowrap;
  }
  .band-gain {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }
  .band-gain.pos { color: var(--green); }
  .band-gain.neg { color: var(--danger); }

  .band-delete {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.1s;
    background: none; border: none; padding: 0; line-height: 1;
  }
  .band-card:hover .band-delete { opacity: 1; }
  .band-delete:hover { color: var(--danger); }

  /* ── Import modal ── */
  #import-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  #import-overlay.open { display: flex; }
  #import-modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    width: 480px;
    max-width: 95vw;
    display: flex; flex-direction: column; gap: 12px;
  }
  #import-modal h3 { font-size: 13px; font-weight: 500; }
  #import-modal p { font-size: 11px; color: var(--muted); line-height: 1.6; }
  #iem-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 9px 11px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    resize: vertical;
    min-height: 120px;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.15s;
  }
  #iem-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  #msg { font-size: 11px; color: var(--muted); font-style: italic; padding: 2px 14px; }
  #msg.error { color: var(--danger); font-style: normal; }
  #msg.ok { color: var(--green); font-style: normal; }

  /* preamp label in toolbar */
  #preamp-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }
  #preamp-display span { color: var(--text); }
</style>
</head>
<body>

<!-- ── TOP BAR ────────────────────────────────────────────── -->
<div id="topbar">
  <div class="logo">squig<span>link</span> player</div>
  <div id="now-playing-bar">
    <div id="np-title">No track selected</div>
    <div id="np-folder"></div>
  </div>
  <div id="transport">
    <button class="t-btn" id="btn-prev" title="Previous">⏮</button>
    <button class="t-btn" id="btn-play" title="Play/Pause">▶</button>
    <button class="t-btn" id="btn-next" title="Next">⏭</button>
    <button class="t-btn" id="btn-shuffle" title="Shuffle">⇄</button>
    <button class="t-btn" id="btn-repeat" title="Repeat">↻</button>
  </div>
</div>

<!-- ── PROGRESS ───────────────────────────────────────────── -->
<div id="progress-wrap">
  <span id="time-cur">0:00</span>
  <div id="progress-bar-outer">
    <div id="progress-bar-fill"></div>
  </div>
  <span id="time-tot">0:00</span>
  <div id="vol-wrap">
    <span id="vol-icon">🔊</span>
    <input type="range" id="vol-slider" min="0" max="1.5" step="0.01" value="1">
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<div id="main">

  <!-- library sidebar -->
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search library…">
    </div>
    <div id="library">
      <div id="lib-status">Loading library…</div>
    </div>
  </div>

  <!-- EQ panel -->
  <div id="eq-panel">

    <!-- toolbar -->
    <div id="eq-toolbar">
      <span class="section-label">PEQ</span>

      <label class="eq-toggle-pill on" id="eq-pill" title="Toggle EQ bypass">
        <input type="checkbox" id="eq-enabled" checked>
        <div class="eq-dot"></div>
        <span id="eq-pill-label">ON</span>
      </label>

      <button class="btn" id="btn-add-band">+ Band</button>
      <button class="btn" id="btn-import">Import…</button>
      <button class="btn danger" id="btn-clear-eq">Clear</button>

      <div id="preamp-display">Preamp: <span id="preamp-val">0.0 dB</span></div>
    </div>

    <!-- frequency response canvas -->
    <div id="eq-canvas-wrap">
      <canvas id="eq-canvas"></canvas>
    </div>

    <!-- per-band strip -->
    <div id="band-strip"></div>

    <div id="msg"></div>
  </div>

  <!-- Import modal -->
  <div id="import-overlay">
    <div id="import-modal">
      <h3>Import Parametric EQ</h3>
      <p>Paste filter text from <a href="https://squig.link" target="_blank" style="color:var(--accent2)">squig.link</a>, <a href="https://autoeq.app" target="_blank" style="color:var(--accent2)">autoeq.app</a>, or any tool that exports APO/REW format:</p>
      <textarea id="iem-input" placeholder="Preamp: -6.8 dB&#10;Filter 1: ON PK Fc 85 Hz Gain 6.9 dB Q 3.000&#10;Filter 2: ON PK Fc 200 Hz Gain -2.0 dB Q 1.500&#10;…"></textarea>
      <div class="modal-btns">
        <button class="btn" id="btn-import-cancel">Cancel</button>
        <button class="btn primary" id="btn-import-apply">Apply</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     EQUALIZER.JS  (Squiglink's own biquad engine, inlined)
     ══════════════════════════════════════════════════════════════ -->
<script>
/*
 Biquad algorithms taken from:
 https://github.com/jaakkopasanen/AutoEq/blob/master/biquad.py
 https://github.com/mohayonao/biquad-coeffs/tree/master/packages/biquad-coeffs-cookbook
*/
Equalizer = (function() {
    let config = {
        DefaultSampleRate: 48000,
        TrebleStartFrom: 7000,
        AutoEQRange: [20, 15000],
        OptimizeQRange: [0.5, 2],
        OptimizeGainRange: [-12, 12],
        OptimizeDeltas: [
            [10, 10, 10, 5, 0.1, 0.5],
            [10, 10, 10, 2, 0.1, 0.2],
            [10, 10, 10, 1, 0.1, 0.1],
        ],
        GraphicEQRawFrequences: (
            new Array(Math.ceil(Math.log(20000 / 20) / Math.log(1.0072))).fill(null)
            .map((_, i) => 20 * Math.pow(1.0072, i))),
        GraphicEQFrequences: Array.from(new Set(
            new Array(Math.ceil(Math.log(20000 / 20) / Math.log(1.0563))).fill(null)
            .map((_, i) => Math.floor(20 * Math.pow(1.0563, i))))).sort((a, b) => a - b)
    };
    let interp = function (fv, fr) {
        let i = 0;
        return fv.map(f => {
            for (; i < fr.length-1; ++i) {
                let [f0, v0] = fr[i]; let [f1, v1] = fr[i+1];
                if (i == 0 && f < f0) return [f, v0];
                else if (f >= f0 && f < f1) { let v = v0 + (v1 - v0) * (f - f0) / (f1 - f0); return [f, v]; }
            }
            return [f, fr[fr.length-1][1]];
        });
    };
    let lowshelf = function (freq, q, gain, sampleRate) {
        freq = freq / (sampleRate || config.DefaultSampleRate);
        freq = Math.max(1e-6, Math.min(freq, 1)); q = Math.max(1e-4, Math.min(q, 1000)); gain = Math.max(-40, Math.min(gain, 40));
        let w0 = 2 * Math.PI * freq, sin = Math.sin(w0), cos = Math.cos(w0), a = Math.pow(10, (gain / 40)), alpha = sin / (2 * q), alphamod = (2 * Math.sqrt(a) * alpha) || 0;
        let a0 = ((a+1) + (a-1) * cos + alphamod), a1 = -2 * ((a-1) + (a+1) * cos), a2 = ((a+1) + (a-1) * cos - alphamod);
        let b0 = a * ((a+1) - (a-1) * cos + alphamod), b1 = 2 * a * ((a-1) - (a+1) * cos), b2 = a * ((a+1) - (a-1) * cos - alphamod);
        return [ 1.0, a1/a0, a2/a0, b0/a0, b1/a0, b2/a0 ];
    };
    let highshelf = function (freq, q, gain, sampleRate) {
        freq = freq / (sampleRate || config.DefaultSampleRate);
        freq = Math.max(1e-6, Math.min(freq, 1)); q = Math.max(1e-4, Math.min(q, 1000)); gain = Math.max(-40, Math.min(gain, 40));
        let w0 = 2 * Math.PI * freq, sin = Math.sin(w0), cos = Math.cos(w0), a = Math.pow(10, (gain / 40)), alpha = sin / (2 * q), alphamod = (2 * Math.sqrt(a) * alpha) || 0;
        let a0 = ((a+1) - (a-1) * cos + alphamod), a1 = 2 * ((a-1) - (a+1) * cos), a2 = ((a+1) - (a-1) * cos - alphamod);
        let b0 = a * ((a+1) + (a-1) * cos + alphamod), b1 = -2 * a * ((a-1) + (a+1) * cos), b2 = a * ((a+1) + (a-1) * cos - alphamod);
        return [ 1.0, a1/a0, a2/a0, b0/a0, b1/a0, b2/a0 ];
    };
    let peaking = function (freq, q, gain, sampleRate) {
        freq = freq / (sampleRate || config.DefaultSampleRate);
        freq = Math.max(1e-6, Math.min(freq, 1)); q = Math.max(1e-4, Math.min(q, 1000)); gain = Math.max(-40, Math.min(gain, 40));
        let w0 = 2 * Math.PI * freq, sin = Math.sin(w0), cos = Math.cos(w0), a = Math.pow(10, (gain / 40)), alpha = sin / (2 * q);
        let a0 = 1 + alpha / a, a1 = -2 * cos, a2 = 1 - alpha / a, b0 = 1 + alpha * a, b1 = -2 * cos, b2 = 1 - alpha * a;
        return [ 1.0, a1/a0, a2/a0, b0/a0, b1/a0, b2/a0 ];
    };
    let calc_gains = function (freqs, coeffs, sampleRate) {
        sampleRate = sampleRate || config.DefaultSampleRate;
        let gains = new Array(freqs.length).fill(0);
        for (let i = 0; i < coeffs.length; ++i) {
            let [a0, a1, a2, b0, b1, b2] = coeffs[i];
            for (let j = 0; j < freqs.length; ++j) {
                let w = 2 * Math.PI * freqs[j] / sampleRate;
                let phi = 4 * Math.pow(Math.sin(w / 2), 2);
                let c = (10 * Math.log10(Math.pow(b0 + b1 + b2, 2) + (b0 * b2 * phi - (b1 * (b0 + b2) + 4 * b0 * b2)) * phi) -
                         10 * Math.log10(Math.pow(a0 + a1 + a2, 2) + (a0 * a2 * phi - (a1 * (a0 + a2) + 4 * a0 * a2)) * phi));
                gains[j] += c;
            }
        }
        return gains;
    };
    let calc_preamp = function (fr1, fr2) {
        let maxGain = -Infinity;
        for (let i = 0; i < fr1.length; ++i) maxGain = Math.max(maxGain, fr2[i][1] - fr1[i][1]);
        return -maxGain;
    };
    let filters_to_coeffs = function (filters, sampleRate) {
        return filters.map(f => {
            if (!f.freq || f.gain == null || !f.q) return null;
            if (f.type === "LSQ") return lowshelf(f.freq, f.q, f.gain, sampleRate);
            if (f.type === "HSQ") return highshelf(f.freq, f.q, f.gain, sampleRate);
            if (f.type === "PK")  return peaking(f.freq, f.q, f.gain, sampleRate);
            return null;
        }).filter(f => f);
    };
    let apply = function (fr, filters, sampleRate) {
        let freqs = fr.map(p => p[0]);
        let coeffs = filters_to_coeffs(filters, sampleRate);
        let gains = calc_gains(freqs, coeffs, sampleRate);
        return fr.map((p, i) => [p[0], p[1] + gains[i]]);
    };
    return { config, interp, lowshelf, highshelf, peaking, calc_gains, calc_preamp, apply, filters_to_coeffs };
})();
</script>

     PLAYER  
     ══════════════════════════════════════════════════════════════ -->
<script>
(function () {
  const SERVER = 'http://localhost:8765';

  // ── State ─────────────────────────────────────────────────────
  let allFiles    = [];
  let playlist    = [];   // currently filtered/ordered list
  let currentIdx  = -1;
  let shuffle     = false;
  let repeatMode  = 0;    // 0=off 1=all 2=one
  let eqEnabled   = true;
  let activeFilters = [];
  let preampDb    = 0;

  // ── Audio graph ───────────────────────────────────────────────
  let audioCtx    = null;
  let sourceNode  = null;
  let gainNode    = null;       // preamp
  let biquads     = [];         // BiquadFilterNode[]
  const audioEl   = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.preload = 'auto';

  let makeupNode = null; // always last node → destination, never rebuilt

  function ensureCtx() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaElementSource(audioEl);
    gainNode   = audioCtx.createGain();
    makeupNode = audioCtx.createGain();
    makeupNode.gain.value = 1.0;
    sourceNode.connect(gainNode);
    makeupNode.connect(audioCtx.destination); // permanent, never changes
  }

  // Tracks the last EQ node so we can disconnect it from makeupNode on rebuild
  let chainTailNode = null;

  function rebuildEQChain() {
    if (!audioCtx) return;

    // Disconnect old chain tail from makeupNode (not from destination)
    if (chainTailNode) {
      try { chainTailNode.disconnect(makeupNode); } catch(e) {}
    }
    biquads.forEach(n => { try { n.disconnect(); } catch(e){} });
    biquads = [];

    gainNode.gain.value = Math.pow(10, preampDb / 20);

    if (!eqEnabled || activeFilters.length === 0) {
      gainNode.connect(makeupNode);
      chainTailNode = gainNode;
      return;
    }

    // IIR chain with Squiglink's exact biquad coefficients — identical math
    const SR = audioCtx.sampleRate;
    let prev = gainNode;
    for (const f of activeFilters) {
      let coeffs;
      if      (f.type === 'PK')  coeffs = Equalizer.peaking(f.freq, f.q, f.gain, SR);
      else if (f.type === 'LSQ') coeffs = Equalizer.lowshelf(f.freq, f.q, f.gain, SR);
      else if (f.type === 'HSQ') coeffs = Equalizer.highshelf(f.freq, f.q, f.gain, SR);
      else continue;
      const [, a1, a2, b0, b1, b2] = coeffs;
      const node = audioCtx.createIIRFilter([b0, b1, b2], [1, a1, a2]);
      prev.connect(node);
      prev = node;
      biquads.push(node);
    }

    prev.connect(makeupNode);
    chainTailNode = prev;
  }

  // ══════════════════════════════════════════════════════════════
  //  INTERACTIVE PEQ ENGINE
  // ══════════════════════════════════════════════════════════════

  // ── Band state ────────────────────────────────────────────────
  // Each band: { id, type:'PK'|'LSQ'|'HSQ', freq, gain, q, enabled }
  let bands = [];
  let selectedBandId = null;
  let nextBandId = 1;

  // Canvas state
  const PLOT_FREQS = (() => {
    const n = 600;
    return Array.from({length:n}, (_,i) => 20 * Math.pow(20000/20, i/(n-1)));
  })();

  // ── Freq/dB ↔ canvas pixel mapping ───────────────────────────
  const DB_MIN = -20, DB_MAX = 20;
  function freqToX(f, W, pad) { return pad.l + Math.log10(f/20)/Math.log10(20000/20)*(W-pad.l-pad.r); }
  function xToFreq(x, W, pad) { return 20 * Math.pow(20000/20, (x-pad.l)/(W-pad.l-pad.r)); }
  function dbToY(db, H, pad)  { return pad.t + (1-(db-DB_MIN)/(DB_MAX-DB_MIN))*(H-pad.t-pad.b); }
  function yToDb(y, H, pad)   { return DB_MAX - (y-pad.t)/(H-pad.t-pad.b)*(DB_MAX-DB_MIN); }

  // ── Compute combined FR curve ─────────────────────────────────
  function computeCurve(SR) {
    const activeBands = bands.filter(b => b.enabled);
    if (!activeBands.length) return PLOT_FREQS.map(() => 0);
    const coeffs = Equalizer.filters_to_coeffs(activeBands, SR || 48000);
    return Equalizer.calc_gains(PLOT_FREQS, coeffs, SR || 48000);
  }

  // ── Auto preamp (no clip) ─────────────────────────────────────
  function computeAutoPreamp() {
    const activeBands = bands.filter(b => b.enabled);
    if (!activeBands.length) return 0;
    const coeffs = Equalizer.filters_to_coeffs(activeBands, 48000);
    const gains  = Equalizer.calc_gains(PLOT_FREQS, coeffs, 48000);
    const maxG   = Math.max(0, ...gains);
    return -maxG;
  }

  // ── Sync bands → audio chain ──────────────────────────────────
  function syncEQ() {
    activeFilters = bands.filter(b => b.enabled);
    preampDb = computeAutoPreamp();
    document.getElementById('preamp-val').textContent = preampDb.toFixed(1) + ' dB';
    rebuildEQChain();
    drawCurve();
    renderBandStrip();
  }

  // ─────────────────────────────────────────────────────────────
  //  CANVAS DRAWING
  // ─────────────────────────────────────────────────────────────
  const canvas  = document.getElementById('eq-canvas');
  const ctx2d   = canvas.getContext('2d');
  const PAD     = { l:42, r:14, t:14, b:28 };

  function resizeCanvas() {
    const wrap = document.getElementById('eq-canvas-wrap');
    const dpr  = devicePixelRatio || 1;
    canvas.width  = wrap.clientWidth  * dpr;
    canvas.height = wrap.clientHeight * dpr;
    canvas.style.width  = wrap.clientWidth  + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
    ctx2d.scale(dpr, dpr);
    drawCurve();
  }

  function drawCurve() {
    const W = canvas.clientWidth, H = canvas.clientHeight;
    if (!W || !H) return;
    ctx2d.clearRect(0, 0, W, H);

    // ── Grid ──
    const gridFreqs = [20,30,50,100,200,300,500,1000,2000,3000,5000,10000,20000];
    ctx2d.strokeStyle = '#1e1e24'; ctx2d.lineWidth = 1;
    gridFreqs.forEach(f => {
      const x = freqToX(f, W, PAD);
      ctx2d.beginPath(); ctx2d.moveTo(x, PAD.t); ctx2d.lineTo(x, H-PAD.b); ctx2d.stroke();
    });
    const dbLines = [-18,-12,-9,-6,-3,0,3,6,9,12,18];
    dbLines.forEach(db => {
      const y = dbToY(db, H, PAD);
      ctx2d.strokeStyle = db === 0 ? '#333340' : '#1e1e24';
      ctx2d.lineWidth   = db === 0 ? 1.5 : 1;
      ctx2d.beginPath(); ctx2d.moveTo(PAD.l, y); ctx2d.lineTo(W-PAD.r, y); ctx2d.stroke();
    });

    // ── Labels ──
    ctx2d.font = '9px DM Mono, monospace';
    ctx2d.fillStyle = '#4a4a55';
    ctx2d.textAlign = 'center';
    [50,100,200,500,'1k','2k','5k','10k','20k'].forEach((lbl, i) => {
      const f = typeof lbl === 'string' ? parseInt(lbl)*1000 : lbl;
      const x = freqToX(f, W, PAD);
      ctx2d.fillText(lbl, x, H-PAD.b+13);
    });
    ctx2d.textAlign = 'right';
    dbLines.filter(db => db % 6 === 0).forEach(db => {
      ctx2d.fillText((db>0?'+':'')+db, PAD.l-5, dbToY(db,H,PAD)+3.5);
    });

    // ── Individual band curves (faint) ──
    bands.forEach(band => {
      if (!band.enabled) return;
      const coeffs = Equalizer.filters_to_coeffs([band], 48000);
      const gains  = Equalizer.calc_gains(PLOT_FREQS, coeffs, 48000);
      const isSel  = band.id === selectedBandId;
      ctx2d.strokeStyle = isSel ? 'rgba(168,159,249,0.35)' : 'rgba(124,106,247,0.15)';
      ctx2d.lineWidth   = isSel ? 1.5 : 1;
      ctx2d.beginPath();
      gains.forEach((g, i) => {
        const x = freqToX(PLOT_FREQS[i], W, PAD);
        const y = dbToY(g, H, PAD);
        i === 0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
      });
      ctx2d.stroke();
    });

    // ── Combined curve ──
    const gains = computeCurve(48000);
    ctx2d.strokeStyle = eqEnabled ? '#a89ff9' : '#4a4a55';
    ctx2d.lineWidth   = 2;
    ctx2d.shadowColor = eqEnabled ? 'rgba(124,106,247,0.4)' : 'transparent';
    ctx2d.shadowBlur  = 6;
    ctx2d.beginPath();
    gains.forEach((g, i) => {
      const x = freqToX(PLOT_FREQS[i], W, PAD);
      const y = dbToY(g, H, PAD);
      i === 0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
    });
    ctx2d.stroke();
    ctx2d.shadowBlur = 0;

    // ── Band handles ──
    bands.forEach(band => {
      const x   = freqToX(band.freq, W, PAD);
      const y   = dbToY(band.gain, H, PAD);
      const sel = band.id === selectedBandId;
      ctx2d.beginPath();
      ctx2d.arc(x, y, sel ? 7 : 5, 0, Math.PI*2);
      ctx2d.fillStyle   = band.enabled ? (sel ? '#a89ff9' : '#7c6af7') : '#3a3a45';
      ctx2d.strokeStyle = sel ? '#fff' : 'rgba(255,255,255,0.25)';
      ctx2d.lineWidth   = sel ? 1.5 : 1;
      ctx2d.fill(); ctx2d.stroke();
    });
  }

  // ─────────────────────────────────────────────────────────────
  //  BAND STRIP
  // ─────────────────────────────────────────────────────────────
  function fmtFreq(f) { return f >= 1000 ? (f/1000).toFixed(f%1000===0?0:1)+'k' : Math.round(f)+''; }
  function fmtGain(g) { return (g>=0?'+':'')+g.toFixed(1)+' dB'; }

  function renderBandStrip() {
    const strip = document.getElementById('band-strip');
    strip.innerHTML = '';
    bands.forEach(band => {
      const card = document.createElement('div');
      card.className = 'band-card' + (band.id===selectedBandId?' selected':'') + (band.enabled?'':' disabled');
      card.dataset.id = band.id;

      const gainClass = band.gain > 0.05 ? 'pos' : band.gain < -0.05 ? 'neg' : '';

      card.innerHTML = `
        <div class="band-num">BAND ${bands.indexOf(band)+1}</div>
        <select class="band-type-sel" data-id="${band.id}">
          <option value="PK"  ${band.type==='PK' ?'selected':''}>PK</option>
          <option value="LSQ" ${band.type==='LSQ'?'selected':''}>LSQ</option>
          <option value="HSQ" ${band.type==='HSQ'?'selected':''}>HSQ</option>
        </select>
        <div class="band-val">${fmtFreq(band.freq)} Hz</div>
        <div class="band-gain ${gainClass}">${fmtGain(band.gain)}</div>
        <div class="band-val" style="color:var(--muted)">Q ${band.q.toFixed(2)}</div>
        <button class="band-delete" data-id="${band.id}" title="Remove band">✕</button>`;

      card.addEventListener('click', e => {
        if (e.target.classList.contains('band-delete') || e.target.classList.contains('band-type-sel')) return;
        selectedBandId = band.id;
        drawCurve(); renderBandStrip();
      });

      card.querySelector('.band-type-sel').addEventListener('change', e => {
        e.stopPropagation();
        band.type = e.target.value;
        syncEQ();
      });
      card.querySelector('.band-delete').addEventListener('click', e => {
        e.stopPropagation();
        bands = bands.filter(b => b.id !== band.id);
        if (selectedBandId === band.id) selectedBandId = bands.length ? bands[bands.length-1].id : null;
        syncEQ();
      });

      strip.appendChild(card);
    });
  }

  // ─────────────────────────────────────────────────────────────
  //  CANVAS DRAG INTERACTION
  // ─────────────────────────────────────────────────────────────
  let dragBand = null, dragStartY = 0, dragStartGain = 0;
  let dragStartX = 0, dragStartFreq = 0;

  function hitTest(cx, cy) {
    const W = canvas.clientWidth, H = canvas.clientHeight;
    for (let i = bands.length-1; i >= 0; i--) {
      const b = bands[i];
      const bx = freqToX(b.freq, W, PAD);
      const by = dbToY(b.gain, H, PAD);
      if (Math.hypot(cx-bx, cy-by) < 10) return b;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const hit = hitTest(cx, cy);
    if (hit) {
      dragBand = hit;
      selectedBandId = hit.id;
      dragStartX = cx; dragStartFreq = hit.freq;
      dragStartY = cy; dragStartGain = hit.gain;
      canvas.style.cursor = 'grabbing';
      renderBandStrip();
    }
  });

  window.addEventListener('mousemove', e => {
    if (!dragBand) return;
    const rect = canvas.getBoundingClientRect();
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

    // Horizontal → frequency
    const newFreq = xToFreq(cx, W, PAD);
    dragBand.freq = Math.max(20, Math.min(20000, newFreq));

    // Vertical → gain  (hold Shift = fine control)
    const rawDb = yToDb(cy, H, PAD);
    const snap = e.shiftKey ? 0.1 : 0.5;
    dragBand.gain = Math.max(-20, Math.min(20, Math.round(rawDb/snap)*snap));

    syncEQ();
  });

  window.addEventListener('mouseup', () => {
    if (dragBand) { canvas.style.cursor = 'crosshair'; dragBand = null; }
  });

  // Scroll on handle = adjust Q
  canvas.addEventListener('wheel', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const hit = hitTest(cx, cy);
    if (!hit) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    hit.q = Math.max(0.1, Math.min(10, Math.round((hit.q + delta)*100)/100));
    selectedBandId = hit.id;
    syncEQ();
  }, { passive: false });

  // Double-click on canvas (empty area) = add band
  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    if (hitTest(cx, cy)) return;
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const freq = Math.round(xToFreq(cx, W, PAD));
    const gain = Math.round(yToDb(cy, H, PAD) * 2) / 2;
    addBand({ freq: Math.max(20, Math.min(20000, freq)), gain: Math.max(-20,Math.min(20,gain)), q: 1.0, type: 'PK' });
  });

  // ─────────────────────────────────────────────────────────────
  //  BAND MANAGEMENT
  // ─────────────────────────────────────────────────────────────
  function addBand(opts) {
    const band = {
      id:      nextBandId++,
      type:    opts.type  || 'PK',
      freq:    opts.freq  || 1000,
      gain:    opts.gain  !== undefined ? opts.gain : 0,
      q:       opts.q     || 1.0,
      enabled: true,
    };
    bands.push(band);
    selectedBandId = band.id;
    syncEQ();
    // Scroll band strip to end
    const strip = document.getElementById('band-strip');
    strip.scrollLeft = strip.scrollWidth;
  }

  // ── Parse imported text ───────────────────────────────────────
  function parseFilterText(text) {
    const filters = [];
    let preamp = 0;
    const chunks = text.replace(/\r\n/g,'\n').split(/(?=Filter\s+\d+:|Preamp:)/i).map(s=>s.trim()).filter(Boolean);
    for (const chunk of chunks) {
      const pm = chunk.match(/Preamp:\s*([-\d.]+)\s*dB/i);
      if (pm) { preamp = parseFloat(pm[1]); continue; }
      const m = chunk.match(/Filter\s+\d+:\s+ON\s+(\w+)\s+Fc\s+([\d.]+)\s+Hz\s+Gain\s+([-\d.]+)\s+dB\s+Q\s+([\d.]+)/i);
      if (m) {
        let type = m[1].toUpperCase();
        if (type==='LS'||type==='LSC') type='LSQ';
        if (type==='HS'||type==='HSC') type='HSQ';
        filters.push({ type, freq:parseFloat(m[2]), gain:parseFloat(m[3]), q:parseFloat(m[4]) });
      }
    }
    return { filters, preamp };
  }

  function importFilters(text) {
    const { filters, preamp } = parseFilterText(text);
    if (!filters.length) { showMsg('No valid filters found.', 'error'); return false; }
    bands = filters.map(f => ({ ...f, id: nextBandId++, enabled: true }));
    selectedBandId = bands.length ? bands[0].id : null;
    // If explicit preamp given, honor it; otherwise auto-compute
    if (preamp !== 0) {
      preampDb = preamp;
      activeFilters = bands.filter(b => b.enabled);
      document.getElementById('preamp-val').textContent = preampDb.toFixed(1) + ' dB';
      rebuildEQChain();
      drawCurve();
      renderBandStrip();
    } else {
      syncEQ();
    }
    showMsg('✓ ' + filters.length + ' bands imported', 'ok');
    return true;
  }

  // ── Library ───────────────────────────────────────────────────
  async function loadLibrary() {
    const libEl = document.getElementById('library');
    try {
      const res = await fetch(`${SERVER}/music`);
      if (!res.ok) throw new Error('Server error');
      allFiles = await res.json();
      playlist = [...allFiles];
      renderLibrary(allFiles);
    } catch (e) {
      libEl.innerHTML = `<div id="lib-status" style="color:var(--danger)">
        ⚠ Cannot reach server.<br>
        <span style="font-size:11px">Make sure server.js is running:<br>
        <code>node server.js</code></span></div>`;
    }
  }

  function groupByFolder(files) {
    const groups = {};
    for (const f of files) {
      const parts = f.split('/');
      const folder = parts.length > 1 ? parts.slice(0, -1).join(' / ') : '—';
      const name   = parts[parts.length - 1];
      if (!groups[folder]) groups[folder] = [];
      groups[folder].push({ path: f, name: name.replace(/\.[^.]+$/, '') });
    }
    return groups;
  }

  function renderLibrary(files) {
    const libEl = document.getElementById('library');
    if (files.length === 0) {
      libEl.innerHTML = '<div id="lib-status">No tracks found.</div>';
      return;
    }
    playlist = files;
    const groups = groupByFolder(files);
    let html = '';
    for (const [folder, tracks] of Object.entries(groups)) {
      html += `<div class="lib-folder">${folder}</div>`;
      for (const t of tracks) {
        const idx = allFiles.indexOf(t.path);
        html += `<div class="lib-track" data-path="${t.path}" data-idx="${idx}">${t.name}</div>`;
      }
    }
    libEl.innerHTML = html;

    libEl.querySelectorAll('.lib-track').forEach(el => {
      el.addEventListener('click', () => {
        const p = el.dataset.path;
        currentIdx = playlist.indexOf(p);
        if (currentIdx === -1) { playlist = files; currentIdx = playlist.indexOf(p); }
        playTrack(p);
      });
    });
    highlightCurrent();
  }

  function highlightCurrent() {
    document.querySelectorAll('.lib-track').forEach(el => {
      el.classList.toggle('playing', el.dataset.path === (playlist[currentIdx] || ''));
    });
  }

  // ── Playback ──────────────────────────────────────────────────
  function playTrack(path) {
    ensureCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioEl.src = `${SERVER}/file/${encodeURIComponent(path)}`;
    audioEl.play();

    const parts = path.split('/');
    document.getElementById('np-title').textContent = parts[parts.length - 1].replace(/\.[^.]+$/, '');
    document.getElementById('np-folder').textContent = parts.length > 1 ? parts.slice(0, -1).join(' / ') : '';
    document.getElementById('btn-play').textContent = '⏸';
    rebuildEQChain();
    highlightCurrent();
  }

  function togglePlay() {
    ensureCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (audioEl.paused) {
      if (!audioEl.src) { if (playlist.length) { currentIdx = 0; playTrack(playlist[0]); } return; }
      audioEl.play();
      document.getElementById('btn-play').textContent = '⏸';
    } else {
      audioEl.pause();
      document.getElementById('btn-play').textContent = '▶';
    }
  }

  function playNext() {
    if (playlist.length === 0) return;
    if (repeatMode === 2) { audioEl.currentTime = 0; audioEl.play(); return; }
    let next;
    if (shuffle) {
      next = Math.floor(Math.random() * playlist.length);
    } else {
      next = (currentIdx + 1) % playlist.length;
    }
    currentIdx = next;
    playTrack(playlist[currentIdx]);
  }

  function playPrev() {
    if (playlist.length === 0) return;
    if (audioEl.currentTime > 3) { audioEl.currentTime = 0; return; }
    currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
    playTrack(playlist[currentIdx]);
  }

  // ── Progress / time ───────────────────────────────────────────
  function fmt(s) {
    s = Math.floor(s || 0);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  audioEl.addEventListener('timeupdate', () => {
    const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration * 100) : 0;
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    document.getElementById('time-cur').textContent = fmt(audioEl.currentTime);
    document.getElementById('time-tot').textContent = fmt(audioEl.duration);
  });

  audioEl.addEventListener('ended', () => {
    if (repeatMode === 2) { audioEl.play(); return; }
    if (repeatMode === 1 || currentIdx < playlist.length - 1 || shuffle) {
      playNext();
    } else {
      document.getElementById('btn-play').textContent = '▶';
    }
  });

  audioEl.addEventListener('play',  () => { document.getElementById('btn-play').textContent = '⏸'; });
  audioEl.addEventListener('pause', () => { document.getElementById('btn-play').textContent = '▶'; });

  document.getElementById('progress-bar-outer').addEventListener('click', e => {
    if (!audioEl.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
  });

  document.getElementById('vol-slider').addEventListener('input', e => {
    // Control makeupNode gain so we can go above 1.0 to compensate Web Audio path loss
    if (makeupNode) makeupNode.gain.value = parseFloat(e.target.value);
    else audioEl.volume = Math.min(1, e.target.value);
  });

  // ── Transport buttons ─────────────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-prev').addEventListener('click', playPrev);
  document.getElementById('btn-next').addEventListener('click', playNext);

  document.getElementById('btn-shuffle').addEventListener('click', function() {
    shuffle = !shuffle;
    this.classList.toggle('active', shuffle);
  });

  document.getElementById('btn-repeat').addEventListener('click', function() {
    repeatMode = (repeatMode + 1) % 3;
    this.classList.toggle('active', repeatMode > 0);
    this.textContent = repeatMode === 2 ? '↻¹' : '↻';
  });

  // ── Search ────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    const filtered = q ? allFiles.filter(f => f.toLowerCase().includes(q)) : allFiles;
    renderLibrary(filtered);
  });

  // ── EQ toolbar controls ──────────────────────────────────────
  const eqPill = document.getElementById('eq-pill');
  const eqCheckbox = document.getElementById('eq-enabled');
  eqPill.addEventListener('click', () => {
    eqEnabled = !eqEnabled;
    eqCheckbox.checked = eqEnabled;
    eqPill.classList.toggle('on', eqEnabled);
    document.getElementById('eq-pill-label').textContent = eqEnabled ? 'ON' : 'OFF';
    rebuildEQChain();
    drawCurve();
  });

  document.getElementById('btn-add-band').addEventListener('click', () => {
    addBand({ freq: 1000, gain: 0, q: 1.0, type: 'PK' });
  });

  document.getElementById('btn-clear-eq').addEventListener('click', () => {
    bands = []; selectedBandId = null; activeFilters = []; preampDb = 0;
    document.getElementById('preamp-val').textContent = '0.0 dB';
    rebuildEQChain(); drawCurve(); renderBandStrip();
    showMsg('EQ cleared.', '');
  });

  // Import modal
  const importOverlay = document.getElementById('import-overlay');
  document.getElementById('btn-import').addEventListener('click', () => {
    importOverlay.classList.add('open');
    document.getElementById('iem-input').focus();
  });
  document.getElementById('btn-import-cancel').addEventListener('click', () => {
    importOverlay.classList.remove('open');
  });
  importOverlay.addEventListener('click', e => {
    if (e.target === importOverlay) importOverlay.classList.remove('open');
  });
  document.getElementById('btn-import-apply').addEventListener('click', () => {
    const text = document.getElementById('iem-input').value.trim();
    if (importFilters(text)) { importOverlay.classList.remove('open'); }
  });

  // ── Helpers ───────────────────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = type || '';
    if (text) setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 3000);
  }

  // ── Keyboard shortcuts ────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') { audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 10); }
    if (e.code === 'ArrowLeft')  { audioEl.currentTime = Math.max(0, audioEl.currentTime - 10); }
    if (e.code === 'ArrowUp')    { const s = document.getElementById('vol-slider'); s.value = Math.min(1.5, parseFloat(s.value) + 0.05); if (makeupNode) makeupNode.gain.value = parseFloat(s.value); }
    if (e.code === 'ArrowDown')  { const s = document.getElementById('vol-slider'); s.value = Math.max(0, parseFloat(s.value) - 0.05); if (makeupNode) makeupNode.gain.value = parseFloat(s.value); }
    // Delete selected band
    if ((e.code === 'Backspace' || e.code === 'Delete') && selectedBandId !== null) {
      bands = bands.filter(b => b.id !== selectedBandId);
      selectedBandId = bands.length ? bands[bands.length-1].id : null;
      syncEQ();
    }
  });

  // ── Resize observer ───────────────────────────────────────────
  new ResizeObserver(resizeCanvas).observe(document.getElementById('eq-canvas-wrap'));

  // ── Boot ──────────────────────────────────────────────────────
  resizeCanvas();
  loadLibrary();
})();
</script>
</body>
</html>
